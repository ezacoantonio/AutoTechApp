services:
  - type: web
    name: mechanic-mindset-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - server/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_IN_MEMORY_DB
        value: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://mechanic-mindset-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: mechanic-mindset/notebooks

  - type: web
    name: mechanic-mindset-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - client/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mechanic-mindset-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
